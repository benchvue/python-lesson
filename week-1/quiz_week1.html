<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Week 1 Quiz — Python Basics</title>
<style>
  :root{ --ok:#10b981; --no:#ef4444; --accent:#6366f1; --muted:#9a9a9a; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:#fff; font-family:'Segoe UI',system-ui,sans-serif; color:#111;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:54px 20px; }
  h1{ font-size:13px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:#999; margin-bottom:8px; }
  h2{ font-size:26px; font-weight:600; letter-spacing:-.02em; text-align:center; margin-bottom:6px; }
  .subtitle{ font-size:13px; color:var(--muted); margin-bottom:30px; text-align:center; }

  .wrap{ width:100%; max-width:600px; }

  .scorebar{ position:sticky; top:0; background:#fff; z-index:5; display:flex; align-items:center; justify-content:space-between;
    padding:10px 0; margin-bottom:14px; border-bottom:1px solid #f0f0f4; }
  .score{ font-size:13px; font-weight:600; color:#555; }
  .score b{ color:var(--accent); font-size:15px; }
  .reset{ font-family:inherit; font-size:12.5px; font-weight:600; cursor:pointer; border:1px solid #e3e3ea;
    background:#fff; color:#666; border-radius:9px; padding:6px 13px; transition:all .15s; }
  .reset:hover{ border-color:#ccc; color:#222; }

  .q{ border:1.5px solid #ececf2; border-radius:16px; padding:20px 18px; margin-bottom:20px; }
  .q-num{ font-size:10.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); }
  .q-text{ font-size:15.5px; font-weight:600; margin:5px 0 13px; letter-spacing:-.01em; }
  .code{ background:#1e2030; border-radius:10px; padding:12px 14px; margin-bottom:15px;
    font-family:'SF Mono','Consolas',monospace; font-size:13px; line-height:1.75; color:#d7dce8; overflow-x:auto; }
  .t-name{ color:#89ddff; } .t-op{ color:#c792ea; } .t-str{ color:#c3e88d; } .t-num{ color:#f78c6c; }
  .t-fn{ color:#ffcb6b; } .t-punc{ color:#9aa4c0; } .t-f{ color:#ffcb6b; font-weight:700; } .t-brace{ color:#ff9cee; }

  .opts{ display:flex; flex-direction:column; gap:9px; }
  .opt{ display:flex; align-items:center; gap:10px; text-align:left; width:100%;
    font-family:'SF Mono','Consolas',monospace; font-size:13px; color:#333;
    background:#fff; border:1.5px solid #e6e6ee; border-radius:10px; padding:11px 13px; cursor:pointer;
    transition:border-color .15s, background .15s, transform .1s; }
  .opt:hover:not(:disabled){ border-color:#c7c7d6; }
  .opt:active:not(:disabled){ transform:scale(.99); }
  .opt .mk{ width:18px; height:18px; border-radius:50%; border:2px solid #d3d3df; flex:none;
    display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff; font-family:'Segoe UI',sans-serif; }
  .opt:disabled{ cursor:default; }
  .opt.correct{ border-color:var(--ok); background:color-mix(in srgb,var(--ok) 8%,#fff); color:#0a6b4d; }
  .opt.correct .mk{ background:var(--ok); border-color:var(--ok); }
  .opt.wrong{ border-color:var(--no); background:color-mix(in srgb,var(--no) 8%,#fff); color:#a31818; }
  .opt.wrong .mk{ background:var(--no); border-color:var(--no); }

  .explain{ font-size:12.5px; color:#666; margin-top:12px; line-height:1.5; display:none; }
  .explain.show{ display:block; }
  .explain b{ color:#222; }
  .q.answered.right{ border-color:color-mix(in srgb,var(--ok) 40%,#fff); }
  .q.answered.miss{ border-color:color-mix(in srgb,var(--no) 35%,#fff); }

  .result{ text-align:center; font-size:15px; font-weight:600; color:#111; margin-top:6px;
    padding:16px; border-radius:14px; background:#f6f7fb; display:none; }
  .result.show{ display:block; }
  .result span{ font-size:24px; display:block; margin-bottom:4px; }

  @media (max-width:480px){ body{ padding:40px 14px; } h2{ font-size:21px; } .code{ font-size:11.5px; } }
</style>
</head>
<body>
  <h1>Python 3 · Week 1</h1>
  <h2>Quick Quiz</h2>
  <div class="subtitle">5 questions on what you learned — tap an answer</div>

  <div class="wrap">
    <div class="scorebar">
      <div class="score">Score: <b id="score">0</b> / <span id="total">5</span></div>
      <button class="reset" id="reset">↺ Reset</button>
    </div>

    <div id="quiz"></div>

    <div class="result" id="result"></div>
  </div>

<script>
const QUIZ=[
  {
    q:'What does this program print?',
    code:'<span class="t-name">score</span> <span class="t-op">=</span> <span class="t-num">95</span>\n'+
         '<span class="t-fn">print</span><span class="t-punc">(</span><span class="t-f">f</span><span class="t-str">"Score: </span><span class="t-brace">{score}</span><span class="t-str">"</span><span class="t-punc">)</span>',
    options:['Score: {score}','Score: 95','{score}','95'],
    answer:1,
    explain:'An <b>f-string</b> replaces <b>{score}</b> with the value of the variable, so it prints <b>Score: 95</b>.'
  },
  {
    q:'What does this program print?',
    code:'<span class="t-name">revenue</span> <span class="t-op">=</span> <span class="t-num">2500</span>\n'+
         '<span class="t-name">expenses</span> <span class="t-op">=</span> <span class="t-num">1200</span>\n'+
         '<span class="t-name">profit</span> <span class="t-op">=</span> <span class="t-name">revenue</span> <span class="t-op">-</span> <span class="t-name">expenses</span>\n'+
         '<span class="t-fn">print</span><span class="t-punc">(</span><span class="t-str">"Profit:"</span><span class="t-punc">,</span> <span class="t-name">profit</span><span class="t-punc">)</span>',
    options:['Profit: 3700','Profit: 1300','1300','Profit: profit'],
    answer:1,
    explain:'<b>profit = 2500 − 1200 = 1300</b>. With a comma, <b>print()</b> joins the label and value with a space → <b>Profit: 1300</b>.'
  },
  {
    q:'What does this program print?',
    code:'<span class="t-name">my_variable</span> <span class="t-op">=</span> <span class="t-str">\'Hi Valentina\'</span>\n'+
         '<span class="t-fn">print</span><span class="t-punc">(</span><span class="t-name">my_variable</span><span class="t-punc">)</span>',
    options:['my_variable','\'Hi Valentina\'','Hi Valentina','Error'],
    answer:2,
    explain:'<b>print()</b> shows the <b>value</b> stored in the variable (without the quotes) → <b>Hi Valentina</b>.'
  },
  {
    q:'What does this program print?',
    code:'<span class="t-fn">print</span><span class="t-punc">(</span><span class="t-str">"hello"</span><span class="t-punc">,</span> <span class="t-str">"world"</span><span class="t-punc">)</span>',
    options:['helloworld','hello world','"hello" "world"','hello,world'],
    answer:1,
    explain:'When you pass several items separated by commas, <b>print()</b> puts a <b>space</b> between them → <b>hello world</b>.'
  },
  {
    q:'What is the data type of the value 95?',
    code:'<span class="t-name">score</span> <span class="t-op">=</span> <span class="t-num">95</span>',
    options:['str (text)','int (integer)','float (decimal)','bool (True/False)'],
    answer:1,
    explain:'<b>95</b> is a whole number with no quotes and no decimal point, so its type is <b>int</b> (integer).'
  }
];

const quizEl=document.getElementById('quiz');
const scoreEl=document.getElementById('score');
const totalEl=document.getElementById('total');
const resultEl=document.getElementById('result');
const TOTAL=QUIZ.length;
let answered=new Array(TOTAL).fill(false);
let score=0;
totalEl.textContent=TOTAL;

function build(){
  quizEl.innerHTML='';
  QUIZ.forEach((item,qi)=>{
    const card=document.createElement('div');
    card.className='q'; card.id='q'+qi;
    card.innerHTML=`
      <div class="q-num">Question ${qi+1}</div>
      <div class="q-text">${item.q}</div>
      <pre class="code">${item.code}</pre>
      <div class="opts">${item.options.map((o,oi)=>
        `<button class="opt" data-q="${qi}" data-o="${oi}"><span class="mk"></span><span>${o}</span></button>`).join('')}</div>
      <div class="explain" id="ex${qi}">${item.explain}</div>`;
    quizEl.appendChild(card);
  });
  quizEl.querySelectorAll('.opt').forEach(b=> b.addEventListener('click', choose));
}

function choose(e){
  const btn=e.currentTarget;
  const qi=+btn.dataset.q, oi=+btn.dataset.o;
  if(answered[qi]) return;
  answered[qi]=true;
  const card=document.getElementById('q'+qi);
  const correct=QUIZ[qi].answer;
  card.querySelectorAll('.opt').forEach((o,i)=>{
    o.disabled=true;
    if(i===correct){ o.classList.add('correct'); o.querySelector('.mk').textContent='\u2713'; }
    if(i===oi && oi!==correct){ o.classList.add('wrong'); o.querySelector('.mk').textContent='\u2715'; }
  });
  card.classList.add('answered', oi===correct?'right':'miss');
  document.getElementById('ex'+qi).classList.add('show');
  if(oi===correct){ score++; scoreEl.textContent=score; }
  if(answered.every(Boolean)) showResult();
}

function showResult(){
  let emoji, text;
  if(score===TOTAL){ emoji='🎉'; text=`Perfect! ${score} / ${TOTAL} — you nailed Week 1.`; }
  else if(score/TOTAL>=0.6){ emoji='👍'; text=`Nice — ${score} / ${TOTAL}. Almost there!`; }
  else { emoji='📘'; text=`${score} / ${TOTAL} — replay the lessons, then retry.`; }
  resultEl.innerHTML=`<span>${emoji}</span>${text}`;
  resultEl.classList.add('show');
}

function reset(){
  answered=new Array(TOTAL).fill(false); score=0; scoreEl.textContent='0';
  resultEl.classList.remove('show'); build();
  window.scrollTo({top:0,behavior:'smooth'});
}

document.getElementById('reset').addEventListener('click', reset);
build();
</script>
</body>
</html>
