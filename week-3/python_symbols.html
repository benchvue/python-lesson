<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python — Symbols Cheat Sheet</title>
<style>
  :root{
    --c-brk:#6366f1; --c-math:#0ea5e9; --c-cmp:#10b981; --c-shift:#f59e0b; --c-punc:#ec4899; --c-more:#14b8a6;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:#fff; font-family:'Segoe UI', system-ui, sans-serif; color:#111;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:60px 22px; }
  h1{ font-size:13px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:#999; margin-bottom:8px; }
  h2{ font-size:28px; font-weight:600; letter-spacing:-.02em; text-align:center; margin-bottom:6px; }
  .subtitle{ font-size:13px; color:#aaa; margin-bottom:44px; text-align:center; }
  .grid{ width:100%; max-width:880px; display:flex; flex-direction:column; gap:34px; }
  .cat-head{ display:flex; align-items:center; gap:9px; margin-bottom:14px; }
  .dot{ width:9px; height:9px; border-radius:50%; }
  .cat-name{ font-size:15px; font-weight:600; }
  .cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(158px,1fr)); gap:13px; }
  .sym{ --c:#888; border:1.5px solid #eee; border-radius:14px; padding:14px; transition:transform .13s, box-shadow .13s, border-color .13s; }
  .sym:hover{ transform:translateY(-3px); border-color:color-mix(in srgb,var(--c) 45%,#fff); box-shadow:0 8px 20px color-mix(in srgb,var(--c) 20%,transparent); }
  .chip{ display:inline-block; font-family:'SF Mono','Consolas',monospace; font-size:16px; font-weight:700; color:#fff;
    background:var(--c); padding:5px 11px; border-radius:9px; box-shadow:0 2px 6px color-mix(in srgb,var(--c) 40%,transparent); }
  .nm{ font-size:13.5px; font-weight:600; margin:11px 0 2px; }
  .note{ font-size:11px; color:#999; line-height:1.4; min-height:30px; }
  .ex{ margin-top:9px; }
  .ex code{ font-family:'SF Mono','Consolas',monospace; font-size:11.5px; color:#444; background:#f5f5f8; padding:4px 7px; border-radius:6px; display:inline-block; word-break:break-word; }
  .footer{ margin-top:50px; max-width:640px; font-size:12.5px; color:#999; line-height:1.7; text-align:center; }
  .footer b{ color:#666; }
  @media(max-width:480px){ h2{ font-size:22px; } body{ padding:46px 16px; } .cards{ grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>
  <h1>Python 3</h1>
  <h2>Symbols Cheat Sheet</h2>
  <div class="subtitle">brackets, quotes, and shift-key symbols — what each one means, with examples</div>
  <div class="grid" id="grid"></div>
  <div class="footer">
    <b>Common mix-ups:</b> <code>^</code> is XOR, not power — use <code>**</code>.
    Python's logical operators are the words <b>and · or · not</b> (not <code>&amp;&amp;</code> <code>||</code> <code>!</code>).
    <code>" "</code> and <code>' '</code> are the same. <code>$</code> has no meaning in Python.
  </div>
<script>
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const SECTIONS=[
  { name:"Brackets & Quotes", color:"var(--c-brk)", items:[
    ["[ ]","List","make or index a list","nums = [1, 2, 3]"],
    ["{ }","Dict / Set","key:value map, or unique set",'{"a": 1}  ·  {1, 2}'],
    ["( )","Tuple / call","group, call, or a tuple",'print("hi")  ·  (1, 2)'],
    ['" "',"String","text in double quotes",'"hello"'],
    ["' '","String","text in single quotes (same)","'hello'"],
    ['""" """',"Multi-line string","spans lines / docstrings",'"""line 1\nline 2"""'],
  ]},
  { name:"Math", color:"var(--c-math)", items:[
    ["+","Add / join","numbers, or join strings",'2 + 3  ·  "a" + "b"'],
    ["-","Subtract","also makes a negative","5 - 2  ·  -7"],
    ["*","Multiply","also *args unpacking","4 * 3"],
    ["/","Divide","always gives a float","7 / 2 → 3.5"],
    ["//","Floor divide","drops the remainder","7 // 2 → 3"],
    ["%","Modulo","the remainder","7 % 2 → 1"],
    ["**","Power","exponent (not ^)","2 ** 3 → 8"],
  ]},
  { name:"Compare & Assign", color:"var(--c-cmp)", items:[
    ["=","Assign","store a value","x = 5"],
    ["==","Equal?","compare two values","x == 5 → True"],
    ["!=","Not equal?","the main use of !","x != 3"],
    ["< >","Less / greater","compare size","3 < 5 → True"],
    ["<= >=","≤ / ≥","or-equal compare","5 >= 5 → True"],
  ]},
  { name:"The shift-number keys  ! @ # $ % ^ & *", color:"var(--c-shift)", items:[
    ["!","Not-equal only","Python's logical NOT is the word not","x != 0"],
    ["@","Decorator","marks/decorates a function","@property"],
    ["#","Comment","the rest of the line is ignored","# a note"],
    ["$","(unused)","no meaning in Python","—"],
    ["%","Modulo","remainder after division","7 % 2 → 1"],
    ["^","Bitwise XOR","NOT power — use ** for power","5 ^ 3 → 6"],
    ["&","Bitwise AND","also set intersection","{1,2} & {2,3}"],
    ["*","Multiply / unpack","times, or *args","3 * 4"],
  ]},
  { name:"Punctuation", color:"var(--c-punc)", items:[
    [":","Colon","starts a block / slices","if x:  ·  a[1:3]"],
    [",","Comma","separates items","1, 2, 3"],
    [".","Dot","attribute or method","text.upper()"],
    [";","Semicolon","two statements (rare)","a = 1; b = 2"],
    ["_","Underscore","names, throwaway, digits","my_var  ·  1_000"],
    ["\\","Backslash","escape / continue a line",'"a\\nb"'],
  ]},
  { name:"More operators", color:"var(--c-more)", items:[
    ["->","Arrow","return type hint","def f() -> int:"],
    ["|","Pipe","OR / set union / type","int | None"],
    ["~","Tilde","bitwise NOT","~5 → -6"],
  ]},
];
const grid=document.getElementById('grid');
SECTIONS.forEach(sec=>{
  const el=document.createElement('div');
  el.innerHTML=`<div class="cat-head"><span class="dot" style="background:${sec.color}"></span><span class="cat-name">${esc(sec.name)}</span></div>
    <div class="cards">${sec.items.map(([sym,nm,note,ex])=>
      `<div class="sym" style="--c:${sec.color}"><span class="chip">${esc(sym)}</span><div class="nm">${esc(nm)}</div><div class="note">${esc(note)}</div><div class="ex"><code>${esc(ex)}</code></div></div>`
    ).join('')}</div>`;
  grid.appendChild(el);
});
</script>
</body>
</html>
