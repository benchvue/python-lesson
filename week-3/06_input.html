<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python — input()</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#fff;font-family:'Segoe UI',system-ui,sans-serif;color:#111;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:52px 18px;overflow-x:hidden}
  h1{font-size:13px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:#999;margin-bottom:8px}
  h2{font-size:25px;font-weight:600;letter-spacing:-.02em;text-align:center;margin-bottom:6px}
  .subtitle{font-size:13px;color:#9a9a9a;margin-bottom:30px;text-align:center}
  .wrap{width:100%;max-width:660px}
  .code{background:#1e2030;border-radius:12px;padding:13px 16px;margin-bottom:30px;font-family:'SF Mono','Consolas',monospace;font-size:13px;line-height:1.85;box-shadow:0 8px 22px rgba(0,0,0,.13)}
  .cl{display:flex;align-items:center;gap:10px;border-radius:7px;padding:1px 8px;transition:.25s;min-height:22px}
  .cl .gut{color:#5a6080;width:14px;text-align:right}.cl.on{background:rgba(255,255,255,.08)}.cl.on .gut{color:#cfd4e8}
  .t-name{color:#89ddff}.t-op{color:#c792ea}.t-str{color:#c3e88d}.t-fn{color:#ffcb6b}.t-punc{color:#9aa4c0}
  .win{border-radius:11px;overflow:hidden;box-shadow:0 10px 26px rgba(0,0,0,.16);margin-bottom:16px}
  .win-bar{display:flex;align-items:center;gap:7px;padding:9px 13px;background:#2a2d3a}
  .win-bar .d{width:11px;height:11px;border-radius:50%}.d.r{background:#ff5f57}.d.y{background:#febc2e}.d.g{background:#28c840}
  .win-bar .ttl{margin-left:8px;font-size:11.5px;color:#aeb3c2;font-family:'SF Mono','Consolas',monospace}
  .win-body{background:#0b0f18;padding:15px 16px;min-height:118px;font-family:'SF Mono','Consolas',monospace;font-size:13px;line-height:1.75;color:#d7dce8;white-space:pre-wrap}
  .prm{color:#c0c6d6}.inp{color:#ffe08a}.out{color:#9af7c0}
  .cur{display:inline-block;width:8px;height:14px;background:#ffe08a;vertical-align:-2px;animation:blink 1s steps(1) infinite}@keyframes blink{50%{opacity:0}}
  .varrow{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:6px;font-family:'SF Mono','Consolas',monospace;font-size:13px}
  .chip{padding:6px 12px;border:1.5px dashed #d6d9e0;border-radius:9px;color:#bbb;transition:.3s}
  .chip.full{border-style:solid;border-color:#0ea5e9;background:#e8f6fe;color:#0369a1;font-weight:600}
  .chip .ty{font-size:10.5px;opacity:.7;margin-left:5px}
  .status{text-align:center;font-size:13px;color:#555;margin:24px auto 16px;min-height:20px;max-width:600px}.status b{color:#222}
  .controls{display:flex;gap:10px;justify-content:center}
  .controls button{font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;border:none;border-radius:10px;padding:9px 20px;color:#fff;transition:.15s}
  .controls button:active{transform:scale(.95)}.controls button:disabled{opacity:.4;cursor:default}
  #play{background:#10b981}#pause{background:#64748b}#stop{background:#ef4444}
  @media(max-width:560px){h2{font-size:20px}.code{font-size:11px}.win-body{font-size:11.5px}}
</style>
</head>
<body>
  <h1>Python 3 · Week 3</h1>
  <h2>input() — Ask the User</h2>
  <div class="subtitle">input() shows a prompt, waits for typing, and returns it as text</div>
  <div class="wrap">
    <div class="code">
      <div class="cl" id="l1"><span class="gut">1</span><span class="t-name">name</span> <span class="t-op">=</span> <span class="t-fn">input</span><span class="t-punc">(</span><span class="t-str">"Your name: "</span><span class="t-punc">)</span></div>
      <div class="cl" id="l2"><span class="gut">2</span><span class="t-fn">print</span><span class="t-punc">(</span><span class="t-str">"Hello"</span><span class="t-punc">,</span> <span class="t-name">name</span><span class="t-punc">)</span></div>
    </div>
    <div class="win">
      <div class="win-bar"><span class="d r"></span><span class="d y"></span><span class="d g"></span><span class="ttl">Terminal</span></div>
      <div class="win-body" id="term"></div>
    </div>
    <div class="varrow"><span class="chip" id="chip">name = ?</span></div>
    <div class="status" id="status">Press Play to start</div>
    <div class="controls"><button id="play">▶ Play</button><button id="pause" disabled>❚❚ Pause</button><button id="stop" disabled>■ Stop</button></div>
  </div>
<script>
const term=document.getElementById('term'),chip=document.getElementById('chip'),status=document.getElementById('status');
const bP=document.getElementById('play'),bPa=document.getElementById('pause'),bS=document.getElementById('stop');
const PROMPT='Your name: ', ANS='Valentina';
let t=0;const seg=[];const add=(d,o)=>{seg.push(Object.assign({s:t,e:t+d},o));t+=d;};
add(750,{type:'prompt',line:1,st:'The quoted text is the <b>prompt</b> (a parameter). input() shows it and waits.'});
add(1150,{type:'typing',line:1,st:'You type your answer — input() reads the whole line.'});
add(650,{type:'store',line:1,st:'Press Enter → input() returns it as a <b>string</b>, stored in <b>name</b>.'});
add(900,{type:'print',line:2,st:'<b>print("Hello", name)</b> uses the value you entered.'});
add(1250,{type:'hold',line:2,st:'input() ALWAYS returns text (str) — even if you type numbers.'});
const CYCLE=t, TYPE=seg.find(s=>s.type==='typing');
let playing=false,elapsed=0,last=0,raf=null;
function render(ms){
  const s=seg.find(g=>ms>=g.s&&ms<g.e)||seg[seg.length-1];
  let typed=0, showOut=false, waiting=false;
  if(s.type==='prompt'){typed=0;waiting=true;}
  else if(s.type==='typing'){const p=(ms-TYPE.s)/(TYPE.e-TYPE.s);typed=Math.round(p*ANS.length);waiting=true;}
  else if(s.type==='store'){typed=ANS.length;}
  else {typed=ANS.length;showOut=true;}
  let html='<span class="prm">$ python greet.py</span>\n';
  html+='<span class="prm">'+PROMPT+'</span><span class="inp">'+ANS.slice(0,typed)+'</span>';
  if(waiting) html+='<span class="cur"></span>';
  if(showOut) html+='\n<span class="out">Hello '+ANS+'</span>';
  term.innerHTML=html;
  const filled = s.type==='store'||s.type==='print'||s.type==='hold';
  chip.classList.toggle('full',filled);
  chip.innerHTML = filled ? 'name = "Valentina"<span class="ty">str</span>' : 'name = ?';
  document.getElementById('l1').classList.toggle('on',s.line===1);
  document.getElementById('l2').classList.toggle('on',s.line===2);
  status.innerHTML=s.st;
}
function frame(now){if(!playing)return;const dt=now-last;last=now;elapsed=(elapsed+dt)%CYCLE;render(elapsed);raf=requestAnimationFrame(frame);}
function play(){if(playing)return;playing=true;last=performance.now();bP.disabled=true;bPa.disabled=false;bS.disabled=false;raf=requestAnimationFrame(frame);}
function pause(){if(!playing)return;playing=false;cancelAnimationFrame(raf);bP.disabled=false;bPa.disabled=true;status.innerHTML='Paused — press Play to resume';}
function stop(){playing=false;cancelAnimationFrame(raf);elapsed=0;bP.disabled=false;bPa.disabled=true;bS.disabled=true;term.innerHTML='';chip.classList.remove('full');chip.innerHTML='name = ?';document.getElementById('l1').classList.remove('on');document.getElementById('l2').classList.remove('on');status.innerHTML='Press Play to start';}
bP.onclick=play;bPa.onclick=pause;bS.onclick=stop;stop();
</script>
</body>
</html>
