<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python — Comparison Operators</title>
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ background:#fff; font-family:'Segoe UI', system-ui, sans-serif; color:#111;
    display:flex; flex-direction:column; align-items:center; min-height:100vh; padding:60px 22px; }
  h1{ font-size:13px; font-weight:500; letter-spacing:.18em; text-transform:uppercase; color:#999; margin-bottom:8px; }
  h2{ font-size:28px; font-weight:600; letter-spacing:-.02em; text-align:center; margin-bottom:6px; }
  .subtitle{ font-size:13px; color:#aaa; letter-spacing:.02em; margin-bottom:46px; text-align:center; }
  .grid{ width:100%; max-width:820px; display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:16px; }
  .op{ --c:#888; border:1.5px solid #eee; border-radius:16px; padding:18px 16px; transition:transform .14s, box-shadow .14s, border-color .14s; }
  .op:hover{ transform:translateY(-4px); border-color:color-mix(in srgb,var(--c) 45%,#fff); box-shadow:0 10px 24px color-mix(in srgb,var(--c) 22%,transparent); }
  .sym{ display:inline-flex; align-items:center; justify-content:center; min-width:44px; height:44px; padding:0 12px;
    font-family:'SF Mono','Consolas',monospace; font-size:19px; font-weight:700; color:#fff; background:var(--c);
    border-radius:11px; box-shadow:0 3px 8px color-mix(in srgb,var(--c) 40%,transparent); }
  .nm{ font-size:14px; font-weight:600; margin:12px 0 2px; }
  .note{ font-size:11.5px; color:#999; line-height:1.4; margin-bottom:12px; min-height:32px; }
  .ex{ display:flex; align-items:center; gap:8px; font-family:'SF Mono','Consolas',monospace; font-size:13px; }
  .ex .expr{ color:#555; background:#f5f5f8; padding:3px 8px; border-radius:6px; }
  .ex .arrow{ color:#ccc; }
  .res{ font-weight:700; padding:2px 9px; border-radius:6px; font-family:'SF Mono','Consolas',monospace; font-size:12.5px; }
  .res.t{ color:#0a7d57; background:#e9fbf3; }
  .res.f{ color:#c12d2d; background:#fdecec; }
  .footer{ margin-top:52px; font-size:12px; color:#ccc; letter-spacing:.04em; text-align:center; }
  .footer b{ color:#aaa; font-weight:600; }
  @media(max-width:480px){ h2{ font-size:23px; } body{ padding:46px 16px; } .grid{ grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>
  <h1>Python 3</h1>
  <h2>Comparison Operators</h2>
  <div class="subtitle">compare two values — the answer is always <b>True</b> or <b>False</b> (a bool)</div>
  <div class="grid" id="grid"></div>
  <div class="footer"><b>==  !=  &gt;  &lt;  &gt;=  &lt;=</b><br>often used inside <b>if</b> statements and <b>while</b> loops</div>
<script>
const OPS=[
  ['==','Equal to','Are both sides the same?','5 == 5',true,'#6366f1'],
  ['!=','Not equal to','Are the sides different?','5 != 3',true,'#ec4899'],
  ['>','Greater than','Is the left bigger?','5 > 3',true,'#0ea5e9'],
  ['<','Less than','Is the left smaller?','5 < 3',false,'#f59e0b'],
  ['>=','Greater or equal','Bigger than or the same?','5 >= 5',true,'#10b981'],
  ['<=','Less or equal','Smaller than or the same?','3 <= 5',true,'#14b8a6'],
];
const grid=document.getElementById('grid');
OPS.forEach(([sym,nm,note,expr,res,c])=>{
  const el=document.createElement('div'); el.className='op'; el.style.setProperty('--c',c);
  el.innerHTML=`<span class="sym">${sym.replace('>','&gt;').replace('<','&lt;')}</span>
    <div class="nm">${nm}</div>
    <div class="note">${note}</div>
    <div class="ex"><span class="expr">${expr.replace(/>/g,'&gt;').replace(/</g,'&lt;')}</span><span class="arrow">→</span><span class="res ${res?'t':'f'}">${res?'True':'False'}</span></div>`;
  grid.appendChild(el);
});
</script>
</body>
</html>
